<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 3n Brain Controller</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #3b82f6;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .dashboard {
            background: var(--card);
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            font-weight: 700;
            color: var(--accent);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e1e21;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .value {
            font-weight: 600;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        #slice-percentage {
            color: var(--accent);
            font-size: 1.25rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            background: #2563eb33;
            color: #3b82f6;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .results {
            margin-top: 2rem;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #10b981;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Gemma 3n Brain Status</h1>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">Local MatFormer elasticity detection engine is active.</p>

        <div class="stat">
            <span class="label">Hardware Memory Range:</span>
            <span class="value" id="device-ram">Detecting...</span>
        </div>
        <div class="stat">
            <span class="label">Compute Cores:</span>
            <span class="value" id="device-cores">Detecting...</span>
        </div>
        <div class="stat">
            <span class="label">Acceleration:</span>
            <span class="value" id="device-gpu">Detecting...</span>
        </div>
        
        <div class="stat" style="margin-top: 1.5rem; border: none;">
            <span class="label">Target Submodel Slice:</span>
            <span class="value" id="slice-percentage">Calculating...</span>
        </div>

        <div id="status-badge" class="badge">AWAITING INITIALIZATION</div>

        <button id="init-btn" class="btn">Initialize Local Large Brain</button>

        <div id="log-output" class="results"></div>
    </div>

    <script type="module">
        import { initializeAgent, generateNewsletter } from '/static/browser_agent.js';

        const ramEl = document.getElementById('device-ram');
        const coreEl = document.getElementById('device-cores');
        const gpuEl = document.getElementById('device-gpu');
        const sliceEl = document.getElementById('slice-percentage');
        const badgeEl = document.getElementById('status-badge');
        const initBtn = document.getElementById('init-btn');
        const logEl = document.getElementById('log-output');

        // Initial Hardware Detection
        const hasWebGPU = typeof navigator !== "undefined" && Boolean(navigator.gpu);
        const deviceMemory = Number(navigator.deviceMemory || 0);
        const hardwareConcurrency = Number(navigator.hardwareConcurrency || 0);

        ramEl.textContent = deviceMemory > 0 ? `~${deviceMemory} GB` : 'Capped/Unknown';
        coreEl.textContent = `${hardwareConcurrency} Cores`;
        gpuEl.textContent = hasWebGPU ? 'WebGPU' : 'WASM (Fallback)';

        // Predictive Slicing Calc (mirroring browser_agent.js)
        let slice = 12.5;
        if (hasWebGPU && (deviceMemory >= 8 || hardwareConcurrency >= 16)) slice = 100;
        else if (hasWebGPU && deviceMemory >= 8) slice = 75;
        else if (deviceMemory >= 8 || hardwareConcurrency >= 8) slice = 50;
        else if (deviceMemory >= 4) slice = 25;
        
        sliceEl.textContent = `${slice}%`;

        initBtn.onclick = async () => {
            initBtn.disabled = true;
            initBtn.textContent = 'Loading Local Weights...';
            badgeEl.textContent = 'INTERNAL LOADING';
            logEl.style.display = 'block';
            logEl.textContent = 'Connecting to local /models endpoint...\n';

            try {
                await initializeAgent();
                badgeEl.textContent = 'BRAIN ACTIVE';
                initBtn.textContent = 'Generate Sample Newsletter';
                
                initBtn.onclick = async () => {
                    initBtn.disabled = true;
                    initBtn.textContent = 'Generating on-device...';
                    const result = await generateNewsletter("Brief: Future of Local AI. Requirements: 3 sections.");
                    logEl.textContent += `\n\n[SUCCESS] Generated with ${result.metrics.processedWithSlice} model slice via ${result.metrics.backend}.\n\nOutput Preview:\n${result.markdown.slice(0, 200)}...`;
                    initBtn.disabled = false;
                    initBtn.textContent = 'Generate another';
                };
            } catch (err) {
                badgeEl.textContent = 'FAILED';
                logEl.textContent += `\n[ERROR] ${err.message}`;
                initBtn.disabled = false;
                initBtn.textContent = 'Retry Initialization';
            }
        };
    </script>
</body>
</html>
