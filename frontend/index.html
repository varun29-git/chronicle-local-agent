<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chronicle</title>
  <meta
    name="description"
    content="Chronicle is a browser-only newsletter engine that researches, summarizes, and writes on device."
  >
  <link rel="stylesheet" href="/static/chronicle.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <p class="brand-mark">Chronicle</p>
        <p class="brand-subtitle">Browser-only newsletter studio</p>
      </div>

      <div class="runtime-strip">
        <div class="runtime-row">
          <div class="runtime-copy">
            <p class="runtime-label">Browser model</p>
            <p class="runtime-title" id="status-pill">Preparing model</p>
          </div>
          <p class="runtime-text" id="status-copy">Loading local model files.</p>
        </div>

        <div class="runtime-progress" aria-hidden="true">
          <div class="runtime-progress-fill" id="runtime-progress-fill"></div>
        </div>

        <p class="runtime-progress-text" id="runtime-progress-text">Starting warmup…</p>
      </div>
    </header>

    <main class="workspace">
      <section class="chat-thread" id="chat-thread" aria-live="polite" aria-label="Chronicle conversation">
        <div class="empty-state" id="empty-state">
          <p class="empty-eyebrow">Chronicle</p>
          <h1>What should Chronicle cover?</h1>
          <p class="empty-copy">Start with a topic, choose a reasoning mode, and let the browser research and write the issue locally.</p>
        </div>
      </section>
    </main>

    <form id="composer-form" class="composer-shell">
      <div class="composer-card">
        <textarea
          id="brief"
          name="brief"
          rows="4"
          placeholder="Enter a topic, for example: What changed in European AI policy this week?"
          required
        ></textarea>

        <div class="composer-controls">
          <label class="chip-field">
            <span>Depth</span>
            <select name="depth">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </label>

          <label class="chip-field">
            <span>Reasoning mode</span>
            <select name="explanation_style" id="explanation-style">
              <option value="concise" selected>Concise</option>
              <option value="feynman">Feynman</option>
              <option value="soc">Socratic</option>
              <option value="custom">Custom</option>
            </select>
          </label>

          <button type="submit" class="send-button" id="generate-button">Generate</button>
        </div>

        <label class="custom-style-field is-hidden" id="custom-style-field">
          <span>Custom style instructions</span>
          <textarea
            name="style_instructions"
            rows="3"
            placeholder="Example: analytical, compressed, sharp transitions, zero fluff"
          ></textarea>
        </label>
      </div>
    </form>
  </div>

  <script src="/static/chronicle.js" defer></script>
</body>
</html>
