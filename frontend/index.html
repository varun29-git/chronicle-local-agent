<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chronicle</title>
  <meta
    name="description"
    content="Chronicle is a local-first newsletter chatbot that shows the full search and research log as it works."
  >
  <link rel="stylesheet" href="/static/chronicle.css">
</head>
<body>
  <div class="chat-shell">
    <header class="app-header">
      <div class="brand-block">
        <p class="app-kicker">Chronicle</p>
        <h1>Newsletter engine</h1>
        <p class="brand-copy">Local-first research, reasoning, and issue drafting on device.</p>
      </div>
      <div class="runtime-block">
        <p class="runtime-label">Runtime</p>
        <span class="status-pill" id="status-pill">Checking runtime</span>
        <p class="runtime-copy" id="status-copy">Connecting to the local model runtime…</p>
      </div>
    </header>

    <main class="chat-panel">
      <section class="chat-thread" id="chat-thread" aria-live="polite" aria-label="Chronicle conversation"></section>

      <form id="composer-form" class="composer-form">
        <div class="composer-input-row">
          <textarea
            id="brief"
            name="brief"
            rows="4"
            placeholder="Ask for a newsletter, for example: What changed in European AI policy this week?"
            required
          ></textarea>
          <button type="submit" class="send-button" id="generate-button">Send</button>
        </div>

        <details class="advanced-controls">
          <summary>Advanced</summary>

          <div class="composer-controls">
            <label class="control-field">
              <span>Depth</span>
              <select name="depth">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="control-field">
              <span>Style</span>
              <select name="explanation_style" id="explanation-style">
                <option value="concise" selected>Concise</option>
                <option value="feynman">Feynman</option>
                <option value="soc">Socratic</option>
                <option value="custom">Custom</option>
              </select>
            </label>

            <label class="control-field">
              <span>Days</span>
              <input type="number" name="days" min="1" max="30" value="7">
            </label>
          </div>

          <label class="control-field control-field--full is-hidden" id="custom-style-field">
            <span>Custom style instructions</span>
            <textarea
              name="style_instructions"
              rows="3"
              placeholder="Example: aggressive synthesis, short paragraphs, zero fluff"
            ></textarea>
          </label>
        </details>
      </form>
    </main>
  </div>

  <script src="/static/chronicle.js" defer></script>
</body>
</html>
